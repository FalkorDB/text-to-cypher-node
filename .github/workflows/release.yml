name: Release
on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macos-15-intel: free standard Intel runner (builds x86_64 natively).
          # Replaces the retired macos-13 and the paid macos-latest-large.
          # NOTE: GitHub sunsets all Intel macOS runners ~Aug 2027; migrate x64 to an
          # arm64 cross-build (or drop the target) before then.
          - host: macos-15-intel
            build: npm run build -- --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - host: macos-latest
            build: npm run build -- --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - host: windows-latest
            build: npm run build
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |-
              set -e &&
              rustup update stable &&
              export TARGET_CC=clang TARGET_CXX=clang++ &&
              export CC_x86_64_unknown_linux_gnu=clang CXX_x86_64_unknown_linux_gnu=clang++ &&
              AWS_LC_SYS_CMAKE_BUILDER=1 npm run build -- --target x86_64-unknown-linux-gnu &&
              strip *.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add x86_64-unknown-linux-musl &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              npm run build -- --target x86_64-unknown-linux-musl --cross-compile &&
              llvm-strip *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add aarch64-unknown-linux-gnu &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              AWS_LC_SYS_NO_JITTER_ENTROPY=1 npm run build -- --target aarch64-unknown-linux-gnu --cross-compile &&
              llvm-strip *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add aarch64-unknown-linux-musl &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              AWS_LC_SYS_NO_JITTER_ENTROPY=1 npm run build -- --target aarch64-unknown-linux-musl --cross-compile &&
              llvm-strip *.node

    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
          
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-release-${{ matrix.settings.host }}

      - name: Install dependencies
        run: npm install

      - name: Build in docker
        if: ${{ matrix.settings.docker }}
        env:
          BUILD_CMD: ${{ matrix.settings.build }}
        run: |
          docker run --rm --user 0:0 \
            -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db \
            -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache \
            -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index \
            -v ${{ github.workspace }}:/build \
            -w /build \
            -e BUILD_CMD \
            ${{ matrix.settings.docker }} \
            sh -c "$BUILD_CMD"

      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: text-to-cypher.*.node
          if-no-files-found: error

  universal-macOS:
    name: Build universal macOS binary
    needs:
      - build
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-x86_64-apple-darwin
          path: .

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bindings-aarch64-apple-darwin
          path: .

      - name: Combine binaries
        run: npm run universal

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-universal-apple-darwin
          path: text-to-cypher.darwin-universal.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs:
      - build
      - universal-macOS
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: . 
          pattern: bindings-*
          merge-multiple: true

      - name: Verify downloaded artifacts
        run: |
          count=$(find . -maxdepth 1 -name 'text-to-cypher.*.node' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No native binding artifacts were downloaded"
            exit 1
          fi
          find . -maxdepth 1 -name 'text-to-cypher.*.node' -print

      # Re-setup node AFTER artifact manipulation
      - name: Setup node for publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          if ! npx semver "$VERSION" > /dev/null 2>&1; then
            echo "::error::Invalid semver: $VERSION"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Sync generated binding version
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { version } = require('./package.json');
          const file = 'index.js';
          let source = fs.readFileSync(file, 'utf8');
          const original = source;
          const hasGeneratedVersionChecks =
            /bindingPackageVersion !== '[^']+'/.test(source) ||
            /expected [^ ]+ but got/.test(source);
          source = source.replace(
            /bindingPackageVersion !== '[^']+'/g,
            `bindingPackageVersion !== '${version}'`
          );
          source = source.replace(
            /expected [^ ]+ but got/g,
            `expected ${version} but got`
          );
          if (!hasGeneratedVersionChecks) {
            console.log('No generated binding version checks found in index.js; skipping');
            process.exit(0);
          }
          if (
            source === original &&
            !source.includes(`bindingPackageVersion !== '${version}'`)
          ) {
            throw new Error('No generated binding version checks found in index.js');
          }
          fs.writeFileSync(file, source);
          NODE

      - name: Publish to npm
        run: npm publish --provenance --access public
