name: Release
on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # macOS x64 disabled due to billing issues
          # - host: macos-latest-large
          #   build: npm run build -- --target x86_64-apple-darwin
          #   target: x86_64-apple-darwin
          - host: macos-latest
            build: npm run build -- --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - host: windows-latest
            build: npm run build
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: |-
              set -e &&
              rustup update stable &&
              npm run build -- --target x86_64-unknown-linux-gnu &&
              strip *.node
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add x86_64-unknown-linux-musl &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              npm run build -- --target x86_64-unknown-linux-musl --cross-compile &&
              llvm-strip *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add aarch64-unknown-linux-gnu &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              npm run build -- --target aarch64-unknown-linux-gnu --cross-compile &&
              llvm-strip *.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-zig
            build: |-
              set -e &&
              rustup update stable &&
              rustup target add aarch64-unknown-linux-musl &&
              cargo install cargo-zigbuild --version 0.19.8 --locked &&
              npm run build -- --target aarch64-unknown-linux-musl --cross-compile &&
              llvm-strip *.node

    name: stable - ${{ matrix.settings.target }} - node@20
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        if: ${{ !matrix.settings.docker }}
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
          
      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-release-${{ matrix.settings.host }}

      - name: Install dependencies
        run: npm install

      - name: Build in docker
        if: ${{ matrix.settings.docker }}
        env:
          BUILD_CMD: ${{ matrix.settings.build }}
        run: |
          docker run --rm --user 0:0 \
            -v ${{ github.workspace }}/.cargo-cache/git/db:/usr/local/cargo/git/db \
            -v ${{ github.workspace }}/.cargo/registry/cache:/usr/local/cargo/registry/cache \
            -v ${{ github.workspace }}/.cargo/registry/index:/usr/local/cargo/registry/index \
            -v ${{ github.workspace }}:/build \
            -w /build \
            -e BUILD_CMD \
            ${{ matrix.settings.docker }} \
            sh -c "$BUILD_CMD"

      - name: Build
        run: ${{ matrix.settings.build }}
        if: ${{ !matrix.settings.docker }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: text-to-cypher.*.node
          if-no-files-found: error

  # universal-macOS job disabled - requires both x64 and ARM64 builds
  # Currently x64 is disabled due to billing issues
  # universal-macOS:
  #   name: Build universal macOS binary
  #   needs:
  #     - build
  #   runs-on: macos-latest
  #
  #   steps:
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
  #
  #     - name: Setup node
  #       uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
  #       with:
  #         node-version: 20
  #         cache: npm
  #
  #     - name: Install dependencies
  #       run: npm install
  #
  #     - name: Download macOS x64 artifact
  #       uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
  #       with:
  #         name: bindings-x86_64-apple-darwin
  #         path: artifacts
  #
  #     - name: Download macOS arm64 artifact
  #       uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
  #       with:
  #         name: bindings-aarch64-apple-darwin
  #         path: artifacts
  #
  #     - name: Combine binaries
  #       run: npm run universal
  #
  #     - name: Upload artifact
  #       uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
  #       with:
  #         name: bindings-universal-apple-darwin
  #         path: text-to-cypher.*.node
  #         if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs:
      - build
      # - universal-macOS
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: . 
          pattern: bindings-*
          merge-multiple: true

      - name: Move artifacts
        run: npm run artifacts

      # Re-setup node AFTER artifact manipulation
      - name: Setup node for publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from release tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          if ! npx semver "$VERSION" > /dev/null 2>&1; then
            echo "::error::Invalid semver: $VERSION"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --provenance --access public

